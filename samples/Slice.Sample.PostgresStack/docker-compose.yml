# Postgres + pgvector — the single backing service for the whole sample.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: slice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 20
